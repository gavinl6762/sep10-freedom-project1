<!DOCTYPE html>
<html>
  <head>
    <title>Aframe World</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>

  <body>
    <a-scene>

      <!-- Sky -->
      <a-sky color="lightblue"></a-sky>

      <!-- Ground -->
      <a-plane
        position="0 0 -3"
        rotation="-90 0 0"
        width="10"
        height="10"
        color="green">
      </a-plane>

      <!-- Box -->
      <a-box
        position="0 1 -3"
        color="blue">
      </a-box>

    </a-scene>
  </body>
</html>
