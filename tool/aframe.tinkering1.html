<!DOCTYPE html>
<html>
  <head>
    <title>Aframe World</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>

  <body>
    <a-scene>

<!-- Camera -->
  <a-entity position="0 2 8">
    <a-camera wasd-controls look-controls></a-camera>
  </a-entity>

  <!-- Lighting -->
  <a-light type="ambient" intensity="0.5"></a-light>
  <a-light type="directional" position="10 10 10" intensity="1"></a-light>

  <!-- Torso -->
  <a-box position="0 1.5 0" width="1" height="1.5" depth="0.5" color="#ff0000"></a-box>

  <!-- Head -->
  <a-sphere position="0 3 0" radius="0.5" color="#ff0000"></a-sphere>

  <!-- Eyes -->
  <a-box position="-0.15 3.1 0.45" width="0.15" height="0.25" depth="0.05" color="#fff"></a-box>
  <a-box position="0.15 3.1 0.45" width="0.15" height="0.25" depth="0.05" color="#fff"></a-box>

  <!-- Arms -->
  <a-cylinder position="-0.75 1.5 0" radius="0.15" height="1" rotation="0 0 90" color="#0000ff"></a-cylinder>
  <a-cylinder position="0.75 1.5 0" radius="0.15" height="1" rotation="0 0 90" color="#0000ff"></a-cylinder>

  <!-- Legs -->
  <a-cylinder position="-0.3 0.5 0" radius="0.2" height="1" rotation="0 0 0" color="#0000ff"></a-cylinder>
  <a-cylinder position="0.3 0.5 0" radius="0.2" height="1" rotation="0 0 0" color="#0000ff"></a-cylinder>

      <!-- Sky -->
      <a-sky color="lightblue"></a-sky>

      <!-- Ground -->
      <a-plane
        position="0 0 -3"
        rotation="-90 0 0"
        width="100"
        height="100"
        color="green">
      </a-plane>

      <!-- Box1 -->
      <a-box position="0 1 -3" color="blue">
      </a-box>

      <!--Roof of box1-->
      <a-cone position="0 2 -3">
    </a-cone>

    <!--House-->
      <a-box
        position="0 1 -20"
        width="35"
        height="10"
        color="white">
  </a-box>

  <a-box
  position="0 4.4 3"
  width="10"
  height="5"
color="white"
rotation="-90 0 0">
</a-box>

<a-cylinder position="-4.3 2 -4" color="white" height="7" radius="0.7" rotation="0 0 0"></a-cylinder>
<a-cylinder position="4.3 2 -4" color="white" height="7" radius="0.7" rotation="0 0 0"></a-cylinder>
<a-cylinder position="1.6 2 -4" color="white" height="7" radius="0.7" rotation="0 0 0"></a-cylinder>
<a-cylinder position="-1.6 2 -4" color="white" height="7" radius="0.7" rotation="0 0 0"></a-cylinder>

  <a-triangle color="#4CC3D9" vertex-a="0 1 0" vertex-b="-1 -1 0" vertex-c="1 -1 0"></a-triangle>


</a-scene>
  </body>
</html>
